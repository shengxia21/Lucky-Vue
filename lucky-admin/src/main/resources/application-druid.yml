# 数据源配置
spring:
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driverClassName: com.mysql.cj.jdbc.Driver
        druid:
            # 主库数据源
            master:
                url: jdbc:mysql://localhost:3308/lucky-vue?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
                username: root
                password: 123456
            # 从库数据源
            slave:
                # 从数据源开关/默认关闭
                enabled: false
                url: 
                username: 
                password: 
            # 初始连接数
            initialSize: 5
            # 最小连接池数量
            minIdle: 10
            # 最大连接池数量
            maxActive: 20
            # 配置获取连接等待超时的时间
            maxWait: 60000
            # 配置连接超时时间
            connectTimeout: 30000
            # 配置网络超时时间
            socketTimeout: 60000
            # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
            timeBetweenEvictionRunsMillis: 60000
            # 配置一个连接在池中最小生存的时间，单位是毫秒
            minEvictableIdleTimeMillis: 300000
            # 配置一个连接在池中最大生存的时间，单位是毫秒
            maxEvictableIdleTimeMillis: 900000
            # 配置检测连接是否有效
            validationQuery: SELECT 1 FROM DUAL
            # 在空闲时检查连接有效性
            testWhileIdle: true
            # 获取连接时不测试
            testOnBorrow: false
            # 归还连接时不测试
            testOnReturn: false
            # 启用Web请求统计，可以监控URL请求
            webStatFilter: 
                enabled: true
            # 启用Druid内置的监控界面
            statViewServlet:
                enabled: true
                # 设置白名单，不填则允许所有访问
                allow:
                # 配置访问路径（http://localhost:8082/druid/login.html）
                url-pattern: /druid/*
                # 控制台管理用户名和密码
                login-username: lucky
                login-password: 123456
            # 统计SQL执行性能，识别慢查询
            filter:
                stat:
                    enabled: true
                    # 慢SQL记录
                    log-slow-sql: true
                    # 慢SQL阈值：1000毫秒
                    slow-sql-millis: 1000
                    # 合并相似SQL统计
                    merge-sql: true
                # 启用SQL防火墙，防止SQL注入
                wall:
                    config:
                        # 允许批量执行多条SQL
                        multi-statement-allow: true
