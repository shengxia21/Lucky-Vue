# 项目相关配置
lucky:
  # 文件路径 示例（ Windows配置 D:/lucky/uploadPath，Linux配置 /home/lucky/uploadPath）
  profile: /home/lucky/uploadPath

# 生产环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 200
    threads:
      # tomcat最大线程数，默认为200
      max: 400
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 20

spring:
  data:
    # redis 配置
    redis:
      # 地址
      host: localhost
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 0
      # 密码
      password: lucky123
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    druid:
      # 主库数据源
      master:
        url: jdbc:mysql://localhost:3306/lucky-vue?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
        username: root
        password: lucky123
      # 从库数据源
      slave:
        # 从数据源开关/默认关闭
        enabled: false
        url:
        username:
        password:
      # 初始连接数
      initialSize: 5
      # 最小连接池数量
      minIdle: 10
      # 最大连接池数量
      maxActive: 20
      # 配置获取连接等待超时的时间
      maxWait: 60000
      # 配置连接超时时间
      connectTimeout: 30000
      # 配置网络超时时间
      socketTimeout: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      timeBetweenEvictionRunsMillis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      minEvictableIdleTimeMillis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      maxEvictableIdleTimeMillis: 900000
      # 配置检测连接是否有效
      validationQuery: SELECT 1 FROM DUAL
      # 在空闲时检查连接有效性
      testWhileIdle: true
      # 获取连接时不测试
      testOnBorrow: false
      # 归还连接时不测试
      testOnReturn: false
      # 启用Web请求统计，可以监控URL请求
      webStatFilter:
        enabled: true
      # 启用Druid内置的监控界面
      statViewServlet:
        enabled: true
        # 设置白名单，不填则允许所有访问
        allow:
        # 配置访问路径（http://localhost:8082/druid/login.html）
        url-pattern: /druid/*
        # 控制台管理用户名和密码
        login-username: lucky
        login-password: 123456
      # 统计SQL执行性能，识别慢查询
      filter:
        stat:
          enabled: true
          # 慢SQL记录
          log-slow-sql: true
          # 慢SQL阈值：1000毫秒
          slow-sql-millis: 1000
          # 合并相似SQL统计
          merge-sql: true
        # 启用SQL防火墙，防止SQL注入
        wall:
          config:
            # 允许批量执行多条SQL
            multi-statement-allow: true
