# 项目相关配置
lucky:
  # 名称
  name: lucky
  # 版本
  version: 1.0.0
  # 版权年份
  copyrightYear: 2026
  # 获取ip地址开关
  addressEnabled: true
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  servlet:
    # 应用的访问路径
    context-path: /

# 日志配置
logging:
  # 日志级别（TRACE < DEBUG < INFO < WARN < ERROR < FATAL），设置级别后，会打印该级别及更高级别的日志
  level:
    # 该包下展示级别为 info、warn、error、fatal 的日志
    com.lucky: @logging.level@
    # 该包下展示级别为 warn、error、fatal 的日志
    org.springframework: warn
    # 该包下展示级别为 error、fatal 的日志
    org.mybatis.spring.mapper: error

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: @profiles.active@
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  threads:
    # 开启虚拟线程 仅jdk21可用
    virtual:
      enabled: false
  # AI模型配置
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY}

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认90分钟）
  expireTime: 90

# MyBatis Plus配置
mybatis-plus:
  # 搜索指定包别名
  typeAliasesPackage: com.lucky.**.domain
  # 指定要扫描的Mapper类的包的路径
  mapperPackage: com.lucky.**.mapper
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 配置类型处理器的扫描包，找到所有的TypeHandler实现类
  type-handlers-package: com.lucky.framework.handler.type
  # 全局配置信息
  configuration:
    # 使全局的映射器启用或禁用缓存
    cache-enabled: true
    # 允许JDBC 支持自动生成主键
    use-generated-keys: true
    # 配置默认的执行器.SIMPLE就是普通执行器;REUSE执行器会重用预处理语句(prepared statements);BATCH执行器将重用语句并执行批量更新
    default-executor-type: simple
    # 指定 MyBatis 所用日志的具体实现（控制台输出日志需修改 logging.level 为 DEBUG 级别）
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    # 使用驼峰命名法转换字段
#    map-underscore-to-camel-case: true
  global-config:
    # mybatis-plus启动banner
    banner: false
    # 数据库配置
    db-config:
      # 主键策略
      # AUTO自增、NONE空、INPUT用户输入、ASSIGN_ID雪花、ASSIGN_UUID唯一、UUID
      # 如需改为自增 需要将数据库表全部设置为自增
      id-type: ASSIGN_ID
      # 逻辑删除字段
      logic-delete-field: del_flag
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0

# PageHelper分页插件
pagehelper:
  # 指定分页插件使用的数据库类型
  helperDialect: mysql
  # 是否支持通过方法参数传递分页参数
  supportMethodsArguments: true
  # 配置分页查询时计数SQL的方式（使用 count(0) 而不是 count(*)）
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    enabled: @springdoc.enabled@
    # Swagger的文档json数据访问地址
    path: /v3/api-docs
  swagger-ui:
    enabled: @springdoc.enabled@
    # 设置Swagger UI的访问路径
    path: /swagger-ui.html
    # API标签按字母顺序排序
    tags-sorter: alpha
  # 配置分组将不再显示所有接口，而是根据分组进行显示
  group-configs:
    - group: 'common'
      display-name: '公共模块'
      paths-to-match: '/**'
      packages-to-scan: com.lucky.web.controller.common
    - group: 'monitor'
      display-name: '监控模块'
      paths-to-match: '/**'
      packages-to-scan: com.lucky.web.controller.monitor
    - group: 'system'
      display-name: '系统模块'
      paths-to-match: '/**'
      packages-to-scan: com.lucky.web.controller.system

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,yuanlin.asia,www.yuanlin.asia

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*
