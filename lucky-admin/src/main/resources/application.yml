# 项目相关配置
lucky:
  # 名称
  name: lucky
  # 版本
  version: 1.0.0
  # 版权年份
  copyrightYear: 2025
  # 文件路径 示例（ Windows配置D:/lucky/uploadPath，Linux配置 /home/lucky/uploadPath）
  profile: D:/Project/luckyImages/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8082
  port: 8082
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  # 日志级别（error>warn>info>debug）
  level:
    # 该包下只展示级别为debug的日志
    com.lucky: debug
    # 该包下展示级别为warn、info、debug的日志
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  data:
    # redis 配置
    redis:
      # 地址
      host: localhost
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 1
      # 密码
      password: 1234
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认60分钟）
  expireTime: 60

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.lucky.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 全局配置信息
  configuration:
    # 使全局的映射器启用或禁用缓存
    cache-enabled: true
    # 允许JDBC 支持自动生成主键
    use-generated-keys: true
    # 配置默认的执行器.SIMPLE就是普通执行器;REUSE执行器会重用预处理语句(prepared statements);BATCH执行器将重用语句并执行批量更新
    default-executor-type: simple
    # 指定 MyBatis 所用日志的具体实现
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    # 使用驼峰命名法转换字段
#    map-underscore-to-camel-case: true

# PageHelper分页插件
pagehelper:
  # 指定分页插件使用的数据库类型
  helperDialect: mysql
  # 是否支持通过方法参数传递分页参数
  supportMethodsArguments: true
  # 配置分页查询时计数SQL的方式（使用 count(0) 而不是 count(*)）
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    # Swagger的文档json数据访问地址
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    # 设置Swagger UI的访问路径
    path: /swagger-ui.html
    # API标签按字母顺序排序
    tags-sorter: alpha
  # 配置分组将不再显示所有接口，而是根据分组进行显示
  group-configs:
    - group: 'common'
      display-name: '公共模块'
      paths-to-match: '/**'
      packages-to-scan: com.lucky.web.controller.common
    - group: 'monitor'
      display-name: '监控模块'
      paths-to-match: '/**'
      packages-to-scan: com.lucky.web.controller.monitor
    - group: 'system'
      display-name: '系统模块'
      paths-to-match: '/**'
      packages-to-scan: com.lucky.web.controller.system

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*
