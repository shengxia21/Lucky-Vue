# 项目相关配置
lucky:
  # 名称
  name: lucky
  # 版本
  version: 1.0.0
  # 版权年份
  copyrightYear: 2026
  # 获取ip地址开关
  addressEnabled: true
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  servlet:
    # 应用的访问路径
    context-path: /

# 日志配置
logging:
  # 日志级别（TRACE < DEBUG < INFO < WARN < ERROR < FATAL），设置级别后，会打印该级别及更高级别的日志
  level:
    # 该包下展示级别为 info、warn、error、fatal 的日志
    com.lucky: @logging.level@
    # 该包下展示级别为 warn、error、fatal 的日志
    org.springframework: warn
    # 该包下展示级别为 error、fatal 的日志
    org.mybatis.spring.mapper: error

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: @profiles.active@
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  mvc:
    # 设置静态资源路径 防止所有请求都去查静态资源(优化性能)
    static-path-pattern: /static/**
    # 格式化
    format:
      # 日期格式化(Spring MVC 在接收和输出日期时间参数时的全局格式[GET方式])
      date-time: yyyy-MM-dd HH:mm:ss
  jackson:
    # 日期格式化(Jackson 在 JSON 序列化/反序列化 时使用的日期格式[POST方式])
    date-format: yyyy-MM-dd HH:mm:ss
    # 序列化配置
    serialization:
      # 格式化输出(便于阅读)
      indent_output: false
      # 序列化一个空 Bean 时是否抛出异常
      fail_on_empty_beans: false
    # 反序列化配置
    deserialization:
      # 如果 JSON 中包含目标 Java 类不存在的属性，是否抛出异常
      fail_on_unknown_properties: false
  threads:
    # 开启虚拟线程 仅jdk21可用
    virtual:
      enabled: false
  # AI模型配置
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY}

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认90分钟）
  expireTime: 90

# MyBatis Plus配置
mybatis-plus:
  # 搜索指定包别名
  typeAliasesPackage: com.lucky.**.domain
  # 指定要扫描的Mapper类的包的路径
  mapperPackage: com.lucky.**.mapper
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 配置类型处理器的扫描包，找到所有的TypeHandler实现类
  type-handlers-package: com.lucky.framework.handler.type
  # 全局配置信息
  configuration:
    # 指定 MyBatis 所用日志的具体实现（控制台输出日志需修改 logging.level 为 DEBUG 级别）
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    # mybatis-plus启动banner
    banner: false
    # 数据库配置
    db-config:
      # 主键策略
      # AUTO自增、NONE空、INPUT用户输入、ASSIGN_ID雪花、ASSIGN_UUID唯一、UUID
      # 如需改为自增 需要将数据库表全部设置为自增
      id-type: ASSIGN_ID

# VO 转换（数据翻译）相关
easy-trans:
  # 是否开启全局翻译
  # 【QPS > 2000 时建议禁用，启用对性能损耗大】，禁用则需要手动调用 TransService 触发翻译
  # 启用全局翻译（拦截所有 SpringMVC ResponseBody 进行自动翻译 )
  is-enable-global: true

# PageHelper分页插件
pagehelper:
  # 指定分页插件使用的数据库类型
  helperDialect: mysql
  # 是否支持通过方法参数传递分页参数
  supportMethodsArguments: true
  # 配置分页查询时计数SQL的方式（使用 count(0) 而不是 count(*)）
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    enabled: @springdoc.enabled@
    # Swagger的文档json数据访问地址
    path: /v3/api-docs
  swagger-ui:
    enabled: @springdoc.enabled@
    # 设置Swagger UI的访问路径
    path: /swagger-ui.html
    # API标签按字母顺序排序
    tags-sorter: alpha
  # 配置分组将不再显示所有接口，而是根据分组进行显示
  group-configs:
    - group: 'common'
      display-name: '公共模块'
      paths-to-match: '/**'
      packages-to-scan: com.lucky.web.controller.common
    - group: 'monitor'
      display-name: '监控模块'
      paths-to-match: '/**'
      packages-to-scan: com.lucky.web.controller.monitor
    - group: 'system'
      display-name: '系统模块'
      paths-to-match: '/**'
      packages-to-scan: com.lucky.web.controller.system

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,yuanlin.asia,www.yuanlin.asia

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*
